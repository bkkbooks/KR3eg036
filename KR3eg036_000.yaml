body:
  text: 寒疫痢證論今之痢疾自張介賓以來咸謂即內經之腸澼余謂不然腸澼非外感所成乃陰陽藏府氣虛因而腸澼耳痢疾則注下赤白或沃白沃赤赤白沫皆是外感著至教論所謂三陽獨至辨脈法所謂寸口脈陰陽俱緊者法當清邪中上濁邪中下是也五十八難五種傷寒之濕溫即傷寒序例之時行寒疫此亦其一也餘生長三十七年矣竊見通都大邑當夏秋之交輒病痢疾或以一方而愈數百人或客歲之方今歲用之略無一驗大抵時行之氣歲各不同而藏府之氣應之亦不一其處要當於寒疫中求之而瓜瓤蝦蟆攪腸諸證輒復與痢疾相間雜然並具彼瓜瓤蝦蟆攪腸亦是寒疫耳夏秋之交腠理疏泄氣為暑熱所侵亦渙散不聚寒因客之不病痢即病瘧邪之來也皆自太陽入精血虛者即內容少陰之分乃遊於募原迫於府則病痢不迫府者發為瘧其從少陰轉太陰即從缺盆至胸中者從闔部陷胸中則為瓜瓤瓤音陽瓜是也即俗所謂瓜中之腸也瓜瓤證胸高脅起嘔血如汁者是也宜生犀飲捻頸大頭諸證由胸復下腹為蝦蟆證發於表為疙瘩證疙頭上瘡突起也疙瘩證者發塊如瘤遍身流走旦發夕死者是也其邪入里從衛氣散於諸經根結之氣者為攪腸痧攪音絞攪腸證者腸鳴乾嘔水泄不通者是也其乘氣街以傷三焦者為霍亂霍亂者必泄蓋傷府則利作也痢證之邪有屬少陰者有屬陽明者邪在少陰伏於伏沖上干衝脈則下血迫於三焦則注下後沃脈沉遲或沉細下部精足則流於厥陰而少腹急痛下白邪在陽明則胸痛嘔逆屬寒者脈遲細而弦屬熱者脈浮躁其循陽明之氣而下侵大腹之部則下白其入胃者則注下胃氣傷也其循三焦之氣而下膈者則腹脹發熱裡急後重而沃太陰之精傷也其迫於腸者為後沫邪不幹府而客於厥陰則少腹痛下白其下藏液者邪由上脘入胃復出中焦由中焦之絡入藏藏得邪則液不得留也沃白者中焦輸水穀之精於脾邪在太陰則穀精不上輸而下墜也沃赤者太陰之絡傷也下白者邪客大腸大腸六府之精之所留也腎氣不利則六府之精或動也赤瓣者赤瓣者謂所出似腦腦中有赤脈經繞如赤瓣小腸之絡破從白並下也白如雞子白其精不雜者六府之精也稀如涎唾不甚黏膩者五藏之液也稠如鼻涕又雜米泔形者太陰之精也食入於胃上輸於脾淫氣於筋淫精於肝肝在脾下脾氣不升得肝之陽氣故稠脾不散精於肝故下米泔形也結沫如漚者漚水上浮泡也腸間之液也穀精之留於大小腸者得三焦之氣則蒸而為膏邪客腸間液不為膏因迸出也肺氣通調水道大小腸受之邪在腸間則滲入腸內也結沫者膏之未成者也與沫俱出者水氣也太陽證太陽寒疫頭痛鼻塞背微寒邪在風府前及缺盆也肺尚未受病寸口脈左浮右弱黃耆川芎羌活湯主之黃耆生用三錢川芎四錢羌活二錢五分白芷二錢紫蘇二錢太陽寒疫頭痛發熱咳嗽者邪與肺氣爭也寸口脈左右皆浮羌活桔梗甘草湯主之羌活三錢桔梗二錢半甘草二錢半半夏二錢半紫蘇二錢半太陽寒疫發熱二三日頭痛止而渴小便黃赤而熱者肺液熱也胸微緊寸口脈右部浮滯鼠黏子前胡湯主之鼠黏子三錢前胡三錢茯苓三錢枳殼二錢太陽寒疫發熱三四日頭痛止煩心眠不安者邪在胸也關上脈右部浮大黃連連翹梔子湯主之黃連磨一錢連翹三錢梔子五個枳殼二錢太陽寒疫肺擁鼻乾發熱泄而沫白邪從肺傷大腸也寸口右脈滯大尺中右脈微澀馬兜鈴牛蒡子湯主之馬兜鈴十五個牛蒡子二錢前胡二錢半桔梗二錢半黃芩二錢太陽寒疫心煩口熱小便澀赤沫赤關上左部滑大尺中右部滑梔子黃連連翹湯主之梔子十個黃連磨二錢黃芩四錢連翹五錢當歸四錢赤茯苓二錢車前五兜陽明證陽明寒疫胸滿胃脘痛不欲食見食則嘔邪聚上焦也寸口脈右部浮大而軟濁鼠黏子前胡湯主之鼠黏子三錢前胡二錢半枳殼二錢半連翹三錢茯苓三錢證如上關上脈右部遲者寒氣盛也半夏檳榔草果湯主之半夏五錢檳榔二錢草果三個茯苓四錢甘草三錢枳殼三錢胸中滿上脘痛見食則嘔關上脈右部遲而濁半夏檳榔草果湯除草果加鼠黏子二錢主之陽明寒疫胸痛手或冷聲息下脈沉細而弦上焦氣不布也冬蜜半夏湯主之冬蜜一兩半夏六錢茯苓四錢人參三錢細辛八分桂枝二錢炙草二錢粳米一合陽明寒疫上脘寒痛見食則嘔或腹中兩旁痛注下或下藏液者邪從上焦入胃從胃復出中焦未入胃者從上焦下行腸間也中焦傷則邪從經絡入於五藏中焦傷則水穀之精不入五藏而流入腸中也脈寸口關上右部遲而弱半夏赤石脂湯主之半夏六錢肉豆蔻一個赤石脂五錢粳米一合炮姜二錢半茯苓四錢人參三錢炙草二錢藿香二錢陽明寒疫上脘痛止腹旁臍下痛注下與大便相雜關上尺中脈右部遲而微緊者蜜耆當歸茯苓湯主之蜜耆四錢焦術三錢茯苓三錢當歸三錢炙草二錢半生薑二錢半乾薑二錢木香磨一錢烏藥一錢陽明寒疫上脘腹中痛皆止飲食進沃白未盡止者寸口關上尺中脈小而遲者蜜耆當歸棗仁湯主之蜜耆四錢當歸五錢人參三錢棗仁三錢焦術三錢茯神三錢炙草二錢乾薑錢半生薑二錢木香磨一錢紅棗三個元眼五個陽明水泄寒氣從上焦入胃中焦為寒所傷中焦不治水穀之氣下行則泄也脈寸口關上右部皆遲小焦術乾薑木香湯主之焦術五錢人參四錢乾薑炮三錢炙草三錢木香磨錢半陽明寒疫胸中腹中不痛嘔逆泄瀉沃白者邪盡入胃中氣街之氣無邪也太陰營氣傷中焦微也中焦微則氣街總無邪而其氣不能如經也故嘔逆泄瀉沃白脈關上右部微弱藿香半夏湯主之藿香三錢半夏三錢蒼朮二錢半厚朴錢半陳皮一錢炙草一錢生薑三片紅棗三個泄甚加茯苓三錢上焦沃白者邪從中焦復出與氣街氣混而行於太陰太陰氣不升邪為府氣所迫入於腸裡急後重或與大便並出與大便並出者大小腸府氣亂也或獨圊其液膠黏少如鼻涕獨圊無大便者大小腸府氣亂也關下尺中右部浮而弱浮者府氣不和弱者太陰氣衰茯苓當歸湯主之茯苓三錢當歸五錢甘草二錢半酒芍二錢半黃芩二錢黃連磨一錢枳殼錢半厚朴二錢不裡急後重關上尺中脈右部遲者當歸蜜耆木香湯主之當歸四錢蜜耆三錢茯苓三錢陳皮八分炙草錢半木香磨一錢與水液並下加扁豆三錢炒陽明寒疫發熱鼻乾胸痛嘔逆後沃邪乘三焦之氣傷太陰胸中之邪未解也關上右部浮躁馬兜鈴藿香湯主之馬兜鈴三錢牛子二錢藿香二錢白芷錢半前胡二錢枳殼二錢甘草二錢酒芍二錢黃芩陽明寒疫中焦沃白腹痛邪乘三焦氣街止於中脘之下而傷太陰也氣街之邪未解者發熱關上右部浮大而弱浮大者邪在外呼吸之道也弱者太陰之氣傷也大黃木香湯主之大黃酒浸三錢木香磨錢半桔梗二錢半厚朴二錢半甘草二錢半黃芩二錢半當歸三錢茯苓三錢中焦沃白發熱腹滿數至圊不出三焦氣獨盛太陰氣衰也三焦氣所以獨盛者與邪合故也脈關上右部浮大上及寸口下及尺中大黃牛蒡子車前草湯主之大黃酒浸調服六錢芒硝二錢半枳殼三錢厚朴四錢車前五兜牛子三錢胸以上熱盛加石膏四錢下之熱減滿去沃沫不止者熱未徹也關上脈大而弱黃芩當歸大黃湯主之黃芩三錢當歸五錢生地四錢大黃三錢木香錢半厚朴二錢茯苓三錢中焦沃白厄逆四支涼關上尺中小弱者邪在中焦乘中焦之絡上逆故厄氣街之氣頗為邪所阻故四肢涼也黃連柿蒂藿香湯主之黃連錢半大黃酒浸三錢酒芍二錢半甘草二錢半柿蒂五個藿香二錢腹毛錢以黃連錢半吳萸錢半拌勻合炒去吳萸不入藥中焦沃白厄逆四肢厥心煩脈微寸口尺中時不見三焦之氣為邪所阻也香連桂朴湯主之急治之否則入藏也其人喜冷身寒者邪猶在府心昏神惕者不治黃連二錢大黃三錢甘草三錢酒芍三錢阿膠二錢肉桂錢半厚朴三錢腹毛二錢藿香二錢當歸四錢茯苓三錢防風二錢芒硝五分拌炒黃連如前法中焦沃白邪去太陰氣未復泄不止而後沫三部脈皆弦弱者當歸茯苓防黨湯主之歸脾湯亦主之當歸五錢茯苓三錢防黨三錢炙草二錢扁豆炒三錢桔梗二錢木香磨一錢生薑三片紅棗三個白朮三錢酒芍錢半中焦下沫邪自中焦而將歸下焦也小便不利或後重臍下微痛脈關下尺上右部小滑而弱小滑者小腸大腸之氣傷於邪也弱者小腸大腸之水液不行陰氣衰也茯苓白朮車前湯主之茯苓三錢澤瀉三錢白朮二錢半黃芩錢半車前三兜中焦邪去者除白朮黃芩加朱苓二錢沫赤者加當歸三錢不後重者中焦邪盡也中焦下注白邪自中焦歸於大腸也邪歸大腸則水液不行府精必動故下注白也小便不利或後重茯苓扁豆厚朴湯主之茯苓四錢澤瀉三錢焦術二錢半黃芩二錢扁豆三錢甘草二錢厚朴二錢木香磨一錢中焦邪去者小便必利除焦朮黃芩厚朴木香後重者不除厚朴下焦下注白邪自胸中乘氣街歸於下焦也胸中邪未解者鼻乾口渴寸口尺中右部浮小而澀鼠黏子茯苓澤瀉湯主之鼠黏子一錢前胡二錢枳殼錢半茯苓三錢澤瀉二錢朱苓錢半桔梗錢半下焦下注白胸中邪解者鼻不幹口不渴尺中右部脈軟動朱苓澤瀉湯主之朱苓三錢澤瀉二錢半茯苓三錢桔梗二錢半後重加枳殼一錢厚朴錢半陽明寒疫歸於厥陰小腹緊痛下白尺中右部脈沉烏藥茯苓湯主之烏藥二錢小茴錢半茯苓三錢厚朴一錢枳殼一錢陽明寒疫頭痛腹痛口渴者邪乘陽明氣下復上走頭也寸口關上尺中脈右部皆軟而浮軟者邪在根結氣之外也浮者邪未乘氣街之氣也石膏白芷湯主之石膏三錢白芷二錢葛根煨錢半甘草錢半防風二錢荊芥二錢粳米一合陽明寒疫鼻乾心煩邪乘根結之氣也寸口右部浮小而弦浮小者根結之氣為邪所乘也弦者陽氣不旁通也藿香前胡桔梗湯主之藿香二錢前胡二錢半桔梗二錢甘草一錢荊芥一錢紫蘇錢半陽明寒疫鼻乾心煩發熱寸口右部浮而澀牛蒡子連翹湯主之牛蒡子錢半馬兜鈴十個連翹二錢前胡錢半黃芩錢半枳殼一錢熱甚加黃連五分磨陽明寒疫下沫脫肛而腫者邪自肺乘大腸之絡入於大腸也脈小而弱尺中右部時一躁也寸口右部時一滯也馬兜鈴當歸牛蒡子湯主之馬兜鈴三錢厚朴三錢當歸五錢牛子二錢枳殼二錢槐角二錢澤瀉二錢秦艽二錢地榆錢半芒硝五分少陰證少陰寒疫頭痛背項𠘧𠘧惡寒手足清冷喉中痰作者邪在伏沖兼及肺也寸口關上左右尺中左部脈散弱當歸常山湯主之當歸五錢生耆三錢熟首烏五錢益母三錢常山錢半羌活二錢半防風二錢葛根二錢茯苓三錢生薑二錢半少陰寒疫傷沖四肢懈惰背痛連心下血關上脈左部遲澀尺中脈左部遲生耆防風當歸湯主之生耆四錢當歸五錢防風二錢半羌活二錢半殭蠶錢半柴胡錢半紫草一錢葛根二錢生薑三片少陰寒疫由腰際隨囟門吸氣直過黃庭至胃下與原氣別使之氣入胃其人關元氣衰也腰冷腹寒痛先水泄後注下脈尺中左部尺中右部關上右部微而遲肉桂吳萸湯主之熟地四錢山藥炒三錢扁豆炒三錢炙草錢半乾薑二錢吳萸八分肉桂蒸八分附片二錢半白朮二錢半木香磨八分後重加厚朴一錢滑脫不禁加烏梅三個少陰寒疫由黃庭直抵關元繞臍痛甚呼謈不已者寒實關元也其人小便不利關元未衰故不泄也關下左右脈皆微而弦大黃附子湯主之大黃三錢芒硝七分生附子三錢枳實二錢少陰寒疫遊於募原募原近氣街之道則三焦原氣受邪少陰之氣既傷三焦原氣復受邪以輸於大腸則府精動而腸間水氣不瀉水與府精相混而下下注白也尺中左右脈皆沉而遲茯苓澤瀉肉桂湯主之茯苓五錢澤瀉三錢枳殼二錢肉桂磨一錢黑姜錢半少陰寒疫遊於募原而成注下者必先季脅痛而後腹痛中焦穀氣自升水氣不瀉水氣與府精相混而下利其水則愈五苓散主之朱苓三錢澤瀉五錢茯苓三錢肉桂二錢白朮三錢少陰寒疫腰痛腹不痛循玉房直下則傷腎液傷腎液必下黑豆汁寒疫為非節之寒寒屬北方又幹腎部故下黑汁脈弱而燥弱反在關燥反在尺弱反在上微反在下遲反在上燥反在下也朱苓湯主之朱苓茯苓阿膠滑石澤瀉各二錢半續寒疫痢證太陽寒疫客於風府乘風府之衛氣下入伏沖上薄大腸則為下白沃沫少陰寒疫頭痛背項𠘧𠘧惡寒手足清冷喉中痰作者邪在伏沖兼及肺也脈寸口關上散弱當歸常山湯主之當歸五錢生耆三錢熟首烏五錢益母三錢羌活二錢半防風二錢葛根二錢生薑二錢茯苓錢常山錢半少陰寒疫腰腹痛下泄沃白者脈沉弱尺中脈左右皆弦當歸細辛常山湯主之當歸五錢茯苓三錢獨活錢半細辛八分澤瀉三錢枳殼二錢厚朴三錢傷寒論曰少陰病下利便膿血者桃花湯主之下為精部腎主之六府氣和則腎氣堅固不下泄也寒氣客於少陰則六府氣不和腎不藏而下泄邪氣從衝脈而經於中焦十二經脈皆聚中焦以輸胃之精液於五藏邪至中焦則從中焦之絡以內干五藏而動血海便膿者中焦之液下瀉也便血者血海之血下滲也故曰便膿血其脈弦小而澀弦小者六府之氣不散邪邪循衝脈上行也澀者血海下滲營氣不能滿於隧道也皆於尺中見之微及關上也赤石脂一半全用一半篩末三兩八錢四分乾薑三錢粳米一大白杯上三味以水七升煮米令熟去渣內赤石脂末方寸匕溫服七合日三服若一服愈余勿服傷寒論曰少陰病二三日至四五日腹滿小便不利下利不止便膿血者桃花湯主之衝脈者營血之藪也衝脈起氣街並少陰之經挾臍上行故腹滿小便不利故知邪氣經於中焦血海在心後邪傷中焦止當便膿今又便血故知邪乾血海赤石脂鎮藏之物粳米益藏之品故知邪由五藏而犯血海成氏注傷寒謂便膿血為協熱者非也傷寒論曰少陰病下利便膿血者可刺謂刺足少陰之腧使不上侵中焦故知邪挾臍上行也少陰寒疫亦宜有此證傷寒之邪緩寒疫之邪重重則氣猛故不必侵中焦苟及大腸則已能下白腎氣下固則屈而上逆以干中焦乃成膿血傷寒論曰少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯少陰中風風入腎部腎為水藏水不藏則利清水色純青者風生木木色青也心下必痛者少陰之脈注胸中少陰之邪亦循經至胸中也口乾燥者風性熱熱傷氣液清水皆液所成利清水則液已大傷故口乾燥寒疫之從少陰下者亦宜有此證搏黴利近之矣但搏黴利色如黑豆汁色如黑豆汁者從北方之色也寒疫為非時之寒寒屬北方而又幹腎部故從北方之色也其脈與下純青水者相同也必弱而燥弱反在關燥反在尺弱反在上微反在下遲反在上燥反在下也然清水宜大承氣湯黑汁大承氣不中與也朱苓湯主之傷寒論曰傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹又曰傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血又曰傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者其後必便膿血又曰下利寸脈反浮數尺中自澀者必清膿血又曰下利脈數而渴者令自愈設不差必清膿血以有熱故也厥者邪在厥陰阻外呼吸之氣故陽氣不布於四肢原氣別使之氣勝則呼吸三焦之氣亦勝而發熱邪乃退入於衝脈之分上則陽氣勝故喉痹下則陰氣盛原氣別使之氣既復故下利利則邪去不利則邪轉入少陰而客於衝脈之氣分瘧與癘疫所棲之處也遊於孫絡以入於別絡則絡傷絡傷則便血膿者外呼吸之氣既為所傷中焦之營亦傷精液下墜也宜白頭翁紫參湯白頭翁二兩紫參二兩黃柏二兩秦皮三兩附類方活人敗毒散羌活一兩獨活一兩前胡一兩柴胡一兩茯苓一兩枳殼一兩桔梗一兩人參一兩川芎一兩甘草半兩上為細末每服二錢水一盞入生薑三片煎至七分溫服或沸湯點亦得治傷寒瘟疫風濕風眩拘蜷風痰頭痛目眩四肢痛增寒壯熱項強睛痛及老人少兒皆可服或瘴煙之地或瘟疫時行或人多風痰或處卑濕腳弱此藥不可缺也日二三服以知為度煩熱口乾加黃芩此方寒疫初起頭痛鼻塞發熱可服之普濟消毒飲東垣方黃芩酒炒黃連酒炒各五分元參陳皮甘草各二錢連翹薄荷鼠黏子板藍根如無以青黛代之馬勃俗名土包菰各一錢殭蠶七分升麻七分柴胡桔梗二錢上為末湯調時時服之或蜜丸含化如大便硬加大黃一二錢酒蒸此治大頭瘟方也寒疫胸滿上脘痛而發熱亦可服藿香正氣散局方藿香紫蘇葉白芷各三兩枳殼二兩厚朴二兩大腹皮三兩橘皮半夏各二兩茯苓三兩白朮二兩甘草一兩每五錢加薑棗煎此治霍亂之方寒疫初起憎寒發熱頭痛嘔逆下泄邪乘三焦之氣下肺液之通調水道者皆受邪邪並肺液漬入腸間因而泄作此方主之涼膈散局方連翹四兩黃芩酒炒一兩竹葉七片薄荷一兩大黃酒浸芒硝各二兩甘草二兩加生蜜煎太陽寒疫已下陽明淫於心肺止於膈上上焦不受邪邪隨三焦之氣止於大腸故病心熱口渴小便澀少大便急痛其脈寸口尺中浮澀而數浮者氣傷數者熱盛也神效東風散普門醫品川連黃芩白芍楂肉各一錢二分枳殼檳榔厚朴炒青皮各八分當歸尾地榆炒黑甘草各五分紅花酒洗三分木香三分桃仁三分陽明寒疫從上脘入胃又從三焦之氣下行復出中焦為沃白邪傷其絡則兼赤色邪郁不解迸入大腸故腹痛後重腹痛者邪熱傷營也後重者邪氣在大腸也其脈沉小而數躁此湯主之感應丸肉豆蔻丁香各兩半木香一兩半杏仁百四十粒乾薑一兩巴豆七十粒百草霜一兩巴豆杏仁另研同各末和勻用黃蠟六兩溶化濾去渣入好酒一升煮數沸候酒冷蠟浮令用青油煎熟取蠟同化成汁乘熱拌勻前藥丸如豆大陽明寒疫或內入胃中或外壓三焦之氣街以下大腸營衛與胃氣皆傷赤白注下又成後重其脈遲澀遲為衛寒澀為營傷此方主之道氣丸赤水玄珠青木香萊蔔子炒茴香炒檳榔黑牽牛上等分為末粥丸每三十丸米飲下陽明寒疫心下有水氣進入胃中傷中焦赤白注下小便不利腹滿脹痛上渴引飲其脈沉遲此方主之舟車丸河間黑牽牛炒四兩大黃酒浸三兩甘遂麵煨大戟麵煨芫花醋炒青皮醋炒各一兩木香五錢橘紅一兩上為末水丸椒目大空心服五丸日三服痞悶者多服煩滿者宜初服二丸每加二丸快利為度陽明寒疫從上脘入胃復從中脘外傷營氣又從三焦氣行進入氣液之中使水液不行皆聚於腹致滿脹小便赤澀口渴引飲營衛皆閉不通其脈遲大而弦此方主之大黃丸潔古治瀉利久不愈膿血稠黏裡急後重日夜無度用大黃一兩銼碎好酒二大盞浸半日許煎至一盞半去渣分作二服頓服之利止勿服如未止再服取利為度後服芍藥湯和之利止再服白朮黃芩湯盡撤其毒也陽明寒疫循氣街而下滿於中焦則為沫白後沫其脈浮而弱浮者三焦之氣傷弱者大陰營氣傷邪氣滿於腹腸胃之隙皆邪所樓故里急後重日夜無度大黃蕩邪推陳好酒調營散衛也芍藥湯治行血調氣經曰溲而便膿血知氣行而血止行血則便自愈調血則後重除芍藥一兩當歸五錢黃連五錢黃芩五錢大黃三錢肉桂二錢半甘草炒二錢檳榔二錢木香一錢如便後藏毒加黃柏半兩上九味㕮咀每服五錢水二盞煎至一盞去渣溫服如利不減漸加大黃食後服陽明寒疫中焦沃白與以大黃湯而即止邪總傷營營氣已復也其營氣未復者沃白必不止邪盛而營氣不能驟復也關上尺中遲弦而躁遲弦者太陰氣滯也躁者邪干太陰也邪本居於太陰而上達於陽明也熱者加石膏白朮黃芩湯服前藥利疾總愈更宜調服白朮一兩黃芩七分甘草三錢上㕮咀作二服水一盞半煎一盞溫服更宜調服謂營氣為邪所幹病之大氣總除太陰猶有餘熱而不和也潔古三方治寒疫沃白甚善洵有功於世但沃赤白而手足清冷生厄逆者尚當別處一方黃連阿膠丸和劑治冷熱不調下利赤白裡急後重臍腹疼痛口燥煩渴小便不利黃連去須三兩阿膠碎炒一兩茯苓去皮二兩上以連苓為細末水熬阿膠膏和丸如梧子大每服三十丸空心溫米湯下陽明寒疫中焦沃白見赤營傷絡破也脈關上尺中小而滑小者營血衰滑者邪隨三焦氣陷入營分也此方主之黃連丸一名羚羊角丸治一切熱利及休息利日夜頻併兼治下血黑如雞肝色黃連去須二兩半羚羊角一兩半黃柏去粗皮一兩半赤茯苓去皮半兩上為細末蜜和丸如桐子大每服二十丸姜蜜湯下暑月下利用之尤驗一方用白茯苓臘茶送下陽明寒疫寒鬱為熱隨宗氣下傷太陰為沃白上傷心包衝脈為下血其脈關上尺中小而躁此方主之生地黃湯治熱利不止生地黃五錢地榆七錢半甘草三錢上㕮咀如麻豆大以水二盞煎至一盞去渣分溫二服空心日晚再服陽明寒疫隨氣街氣行變而為熱熱傷太陰營氣及大腸精液沃白沃赤沫赤白關上尺中脈浮躁而沉此湯主之鬱金散治一切熱毒利下血不止川鬱金五錢槐花炒五錢甘草炙二錢半上為細末每服一二錢食前用豆豉湯調下陽明寒疫上傷心絡衝脈血瀉大腸大腸亦熱其脈關上左部尺中右部皆澀而滑中焦未傷也小腸通氣於心小腸受心之熱歸於大腸也茜根散治血利心神煩熱腹中痛不納飲食茜根一兩地榆生地黃乾者當歸犀角屑黃芩各一兩梔子仁五錢黃連去須微炒二兩上㕮咀每服四錢以水一盞入豆豉五十粒薤白七寸煎至六分去渣不拘時溫服陽明寒疫寒鬱為熱傷心包與沖下及中焦邪在中焦故腹中痛不納飲食脈三部小而滑此方主之芍藥黃芩湯東垣治泄利腹痛或後重身熱久不愈脈促者及下利膿血黏稠黃芩一兩芍藥一兩甘草一兩上㕮咀每服一兩水一盞半煎至一盞溫服無時如痛加桂少許陽明寒疫下及腹中陽明與太陰之氣不和致腹痛身熱沫下後重脈關上弦而數弦者陰陽不和數者府氣為邪所幹此方主之香連丸直指治下利赤白裡急後重黃連去蘆用吳萸十兩同炒令赤去吳萸不用二十兩木香不見火四兩八錢八分上為細末醋糊丸如梧子大每服三十丸空心飯飲下陽明寒疫下及腹中陽明與太陰之氣不和邪從陽明內干太陰營分為沃白兼赤關上尺中脈弦而滯此方主之脈微沃白兼赤上為厄逆此方亦主之地榆芍藥湯治泄利膿血脫肛蒼朮八兩地榆三兩卷柏三兩芍藥酒炒三兩上四味㕮咀每服用二兩以水一升煎至八合溫服病退勿服陽明寒疫自下焦迸入大腸則沫赤腸癖脫肛其脈尺中滑此方主之倉廩湯治噤口利有熱及毒氣衝心食即吐出人參茯苓甘草炙前胡川芎羌活桔梗獨活柴胡枳殼陳倉米各等分上㕮咀每服五錢水一盞半生薑三分煎去渣無時熱服陽明寒疫下入腹中中焦受邪太陰氣傷沃白邪還從中焦之絡上衝於心故噤口脈軟濁此方主之犀角丸但是利證服之無有不差犀角屑取黑紋理粗者産後用彌佳宣州黃連苦參多買輕搗全州黃柏赤色者川當歸上各等分為細末和勻空服爛煮糯米飲調方寸匕服之日再服忌黏滑油膩生菜與羚羊角丸同義白頭翁湯金匱白頭翁三兩黃連三兩黃柏三兩秦皮三兩上四味以水七升煮取二升去渣溫服一升不愈再服陽明寒疫下入大腸後重下白脈尺中滑弦滑則為熱弦則為減府精動而府氣傷也此方主之加減平胃散潔古白朮一兩厚朴一兩陳皮一兩木香三錢檳榔三錢甘草七錢桃仁五錢人參五錢黃連五錢阿膠五錢茯苓五錢上㕮咀每服五錢姜三片棗一枚水煎溫服無時血多加桃仁熱加黃連小便澀加茯苓澤瀉氣不下後重加檳榔木香腹痛加官桂芍藥甘草膿多加阿膠濕多加白朮脈洪大加大黃陽明寒疫中焦沃赤白脈弦遲而濁者此方主之犀角散治熱利下赤黃膿血心腹困悶犀角屑一兩黃連去須微炒一兩地榆一兩黃耆一兩當歸五錢木香二錢五分上為散每服三錢以水一盞煎至六分去渣溫服無時陽明寒疫上傷心包衝脈下及太陰氣與大腸外傷三焦氣脈關上尺中寸口大而躁此方主之紫參湯金匱治下利腹痛紫參八兩甘草三兩上二味以水五升先煮紫參取二升內甘草煮取一升半分溫三服下焦寒疫自陽明下腹致腸胃熱太陰陽明不和二便妄行為後沫下白也脈尺中左右滑此方主之除濕湯百一蒼朮泔浸炒半夏薑製厚朴薑製各二兩藿香陳皮去白茯苓去皮各一兩炙草二錢白朮生用一兩或加羌活防風藁本各三四錢每四錢加薑棗煎陽明寒疫下及腹中未變熱致腹滿泄利時有白沃如鼻涕者濕氣盛太陰不營也其脈弦遲此方主之黃連阿膠湯海藏黃連四兩黃柏阿膠俱炒各一兩山梔五錢每四錢煎陽明寒疫中焦沃赤內傷太陰營氣上傷衝脈三焦邪熱未解其脈關上左右皆浮滑而弦氣熱則浮太陰傷則弦也茯苓湯治利後遍身微腫赤茯苓去黑皮一兩澤漆葉微炒一兩白朮微炒一兩黃芩三兩射干防己桑白皮炙黃澤瀉各三兩上㕮咀每服五錢匕先以水三盞煮大豆一合取二盞去渣內藥煎至一盞分為二服未瘥頻服二料陽明寒疫沃白沫後既止則太陰陽明之氣和而餘邪乘陽明之散布者上走頭旁走手足夫太陰穀氣不行則病沃白沫後穀氣既行府氣未復水氣未必遂行也故與以行水之劑附瘟疫方瓜瓤瘟者胸高脅起嘔血如汁者是也宜生犀飲犀角屑二錢蒼朮泔浸麻油炒川連各一錢黃土五錢金汁半盞茶葉一大撮上水煎去渣入金汁攪和日三服夜二服虛加鹽水炒人參大便結加大黃渴加栝蔞根表熱去蒼朮黃土加桂枝川連便膿血去蒼朮倍黃土加黃柏便滑以人中黃代金汁大頭瘟者其濕熱傷高巔必多汗氣蒸初憎寒壯熱體重頭面腫甚目不能開上喘咽喉不利舌乾口燥不速治十死八九宜普濟消毒散如大便硬加酒蒸大黃一二錢緩緩服作丸噙化尤妙若額面焮赤腫脈數者加石膏內實加大黃若發於耳上下前後並額角旁紅腫者加柴胡花粉便實亦加大黃若發於頭腦項下並耳後赤腫者荊防敗毒散加芩連甚者砭針刺之普濟消毒散川連黃芩酒炒人參黑姜甘草桔梗連翹牛子炒研升麻白芷馬勃各一錢殭蠶炒七分板藍根如無以青黛代之柴胡上為末半用水煎去渣食後徐服半用蜜丸噙化就臥以令藥行上行也荊防敗毒散羌活獨活前胡柴胡人參甘草人中黃更妙枳殼桔梗茯苓川芎薄荷牛子炒荊芥各一錢防風錢半上水煎緩服加金汁一杯尤效捻頸瘟者喉痹失音頸大腹脹如蝦蟆者是也宜荊防敗毒散楊梅瘟者遍身紫塊忽然發出梅瘡者是也宜清熱解毒湯及人中黃丸並刺塊出血清熱解毒湯川連酒洗白芍酒洗生地黃芩酒洗人參各三錢石膏雞子大羌活知母各二錢甘草一錢五分升麻葛根各一錢生薑二錢上以水一斗煮取五升每服一升日三夜二人中黃丸大黃尿浸三兩人中黃如無坑垢代之蒼朮麻油炒桔梗滑石各三兩人參川連酒洗防風各五錢香附薑汁拌勻炒一兩五錢神麯丸氣虛四君子湯送血虛四物湯送痰甚二陳湯送熱甚童便送通用清熱解毒湯送二三服疙瘩瘟者發塊如瘤遍身流走旦發夕死者是也三稜針刺入委中三分出血及服人中黃散辰砂雄黃要透明者各一錢五分人中黃一兩上為末薄荷桔梗湯下二錢日三服夜二服絞腸瘟者腸鳴乾嘔水泄不通者是也探吐之宜雙解散防風麻黃川芎連翹薄荷當歸芍藥大黃芒硝各五錢石膏黃芩桔梗各一兩白朮薑汁拌生用荊芥山梔滑石炙草各三兩上為散每三錢加姜三片煎去渣服軟腳瘟者便清泄白足腫難移者是也即濕溫宜蒼朮白虎湯知母六兩石膏一斤甘草二兩粳米六合蒼朮三兩上以水煮米熟去渣內四味再煮減八分溫服一升日三服附採名方治狐惑黃連犀角湯犀角磨汁三錢川連二錢烏梅四個木香磨汁三分上以水盞半煎連梅八分入犀角木香汁和勻服治疫毒發斑嘔逆黑膏生地三兩六錢好淡豆豉二兩六錢豬膏十兩上合煎令三分減一去渣取濃汁如膏入明雄黃如豆大麝香少許和勻分三服治毒氣發斑痛癢犀角消毒湯牛蒡子炒防風二錢荊芥一錢甘草八分犀角磨汁上水煎每服三錢入犀角汁服治時疫疙瘩惡證消毒丸大黃牡蠣煅殭蠶炒各一兩上為末蜜丸彈子大新汲水化下一丸不拘時治大頭時疫三黃湯川連酒炒黃芩酒炒生甘草各等分上以水盞半煎八分每服五錢稍溫徐徐呷之又黃連瀉心湯川連生地知母各一錢五分生甘草五分上以水盞半煎八分溫服又香蘇飲紫蘇香附醋炙各二兩陳皮一兩甘草五錢上為細末每服三錢水煎溫服闢疫雄黃丸明雄黃研一兩赤小豆炒熟丹參鬼箭羽各二兩上為細末煉蜜丸如梧桐子大每日空心以溫水下五丸總同床共被亦不沾染利者謂大便之出如流水之便利也赤白者謂便出有赤有白也注下者謂大便急如射箭也沃者謂所出如蜜之稠如米泔之黏也沫者謂稀於沃又不黏而有泡沫耳
