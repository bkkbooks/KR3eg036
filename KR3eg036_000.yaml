front:
  text: 序道光庚子之秋里中病利死者數十其經余治者凡二十以貧不能具藥而死者一人耳然或半月而愈或十日而愈或瀕死而復健或病輕而更纏綿准之古法參差不齊有莫解其故者昔越人留五泄之名仲景編下利之證元方有利病之候千金具下利之方若外臺祕要家無購本至宋明以來數十家則等諸自鄭以下可耳吾日寢食於秦張孫巢之書而細思其義輒不與病情合唯傷寒經陽明少陰厥陰中有數條可按若承氣湯桃花湯白頭翁湯猶與今證相髣佛自非數方無一相契者乃追憶所治諸候准之以靈素陰陽藏府之理紬繹沉潛頗得其解因成一編新化鄒漢璜識
